name: CI
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  containerd-integration:
    name: containerd integration (${{ matrix.containerd-version }})
    runs-on: ubuntu-26.04
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        containerd-version:
          - "1.7.34"
          - "2.3.3"
    defaults:
      run:
        working-directory: src/github.com/cpuguy83/containerd-shim-systemd-v1
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: actions/checkout@v7
        with:
          path: src/github.com/cpuguy83/containerd-shim-systemd-v1
      - uses: actions/checkout@v7
        with:
          path: src/github.com/containerd/containerd
          repository: containerd/containerd
          ref: v${{ matrix.containerd-version }}
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
      - name: Install required packages
        run: |
          set -e -x
          sudo apt-get update
          sudo apt-get install -y criu
      - name: get containerd
        run: |
          set -ex
          curl -SLf https://github.com/containerd/containerd/releases/download/v${VERSION}/containerd-${VERSION}-linux-amd64.tar.gz | tar -xvz
          sudo systemctl stop containerd
          sudo cp bin/* /usr/bin/
          sudo systemctl start containerd
        env:
          VERSION: ${{ matrix.containerd-version }}
      - name: Install runc failpoint wrapper
        working-directory: src/github.com/containerd/containerd
        run: |
          make bin/runc-fp
          sudo install bin/runc-fp /usr/local/bin/
      - name: install
        run: make test-daemon
      - name: test
        run: |
          set -e -x
          export GOPATH="${GITHUB_WORKSPACE}"
          cd "${GITHUB_WORKSPACE}/src/github.com/containerd/containerd"
          sudo env \
            PATH="${PATH}" \
            GOPATH="${GOPATH}" \
            TEST_RUNTIME="${TEST_RUNTIME}" \
            RUNC_FLAVOR="${RUNC_FLAVOR}" \
            GOTESTSUM_JUNITFILE="${GOTESTSUM_JUNITFILE}" \
            make integration EXTRA_TESTFLAGS="${EXTRA_TESTFLAGS}" GOTEST="${GOTEST}"
        env:
          TEST_RUNTIME: io.containerd.systemd.v1
          RUNC_FLAVOR: runc
          GOTESTSUM_JUNITFILE: ${{github.workspace}}/junit.xml
          EXTRA_TESTFLAGS: "-no-criu -no-shim-cgroup"
          GOTEST: gotestsum --format=standard-verbose --
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always() # always run even if the previous step fails
        with:
          report_paths: ${{github.workspace}}/junit.xml
      - name: debug
        if: ${{ failure() }}
        run: |
          sudo systemctl kill -s USR1 containerd-shim-systemd-v1
          sleep 1
          sudo journalctl --system -u containerd-shim-systemd-v1 | tee ${GITHUB_WORKSPACE}/containerd-shim-systemd-v1.log
          sudo chown $(id -u):$(id -g) /tmp/*containerd-shim-systemd-v1-goroutines*
      - name: Show shim logs
        if: always()
        run: sudo journalctl --system --unit=containerd-shim-systemd-v1.service --no-pager
      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: daemon-log-${{ matrix.containerd-version }}
          path: ${{github.workspace}}/containerd-shim-systemd-v1.log
      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: goroutines-${{ matrix.containerd-version }}
          path: /tmp/*containerd-shim-systemd-v1-goroutines*

  test:
    runs-on: ubuntu-26.04
    timeout-minutes: 15
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: actions/checkout@v7
      - name: build tests
        # Compile the race-enabled test binary as the normal user so the Go
        # toolchain and module cache are never touched as root.
        run: go test -race -c -o shim.test .
      - name: run tests against system systemd
        # Run the precompiled binary as root so integration tests use
        # /run/systemd/private without invoking the Go toolchain through sudo.
        run: |
          set -euxo pipefail
          sudo test -S /run/systemd/private
          sudo env -u XDG_RUNTIME_DIR ./shim.test -test.v
